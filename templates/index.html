<!DOCTYPE html>
<html lang="zh">

<head>
    <title>Think Probe | Intelligence Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/libs/marked.min.js"></script>
    <script src="/static/libs/lucide.min.js"></script>
</head>

<body>
    <div class="container">
        <aside id="menu-sidebar" class="menu-sidebar">
            <div class="menu-sidebar-top">
                <div class="logo-area">
                    <i data-lucide="brain-circuit" style="width: 24px; height: 24px;"></i>
                    <span class="logo-text">THINK PROBE</span>
                </div>
                <button class="menu-toggle" onclick="toggleMenuSidebar()" title="收起菜单栏">
                    <i data-lucide="panel-left-close"></i>
                </button>
            </div>
            <div class="sidebar-nav">
                <button class="nav-item active" data-view="chat" onclick="switchSidebarView('chat')" title="聊天">
                    <i data-lucide="message-square"></i>
                    <span>聊天</span>
                </button>
                <button class="nav-item" data-view="skills" onclick="switchSidebarView('skills')" title="技能管理">
                    <i data-lucide="blocks"></i>
                    <span>技能管理</span>
                </button>
                <button class="nav-item" data-view="mcp" onclick="switchSidebarView('mcp')" title="MCP 管理">
                    <i data-lucide="plug-zap"></i>
                    <span>MCP 管理</span>
                </button>
            </div>
        </aside>
        <div class="workspace">
            <section id="chat-workspace" class="feature-workspace active">
                <aside class="feature-panel">
                    <div class="feature-panel-header">
                        <div class="feature-panel-title">会话列表</div>
                        <button onclick="newConversation()">
                            <i data-lucide="plus"
                                style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px;"></i>
                            新建会话
                        </button>
                    </div>
                    <div id="conversation-list"></div>
                </aside>
                <div class="main">
                    <div class="chat-header">
                        <h1 id="conversation-title" onclick="editConversationTitle()">新会话</h1>
                        <span id="conversation-id"></span>
                    </div>
                    <div id="chat-container" class="new-session">
                        <div id="welcome-screen">
                            <i data-lucide="brain-circuit" style="width: 64px; height: 64px;"></i>
                            <h1>今天想研究点什么？</h1>
                        </div>
                        <div id="messages"></div>
                        <button id="scroll-top-btn" class="scroll-btn hidden" onclick="scrollToTop()">
                            <i data-lucide="chevron-up"></i>
                        </button>

                        <div class="input-area">
                            <div class="input-wrapper">
                                <div id="message-input" contenteditable="true" placeholder="请输入您的问题" onkeydown="handleEnter(event)"></div>
                                <button onclick="stopMessage()" id="stop-button" class="hidden">
                                    <i data-lucide="square" style="fill: currentColor;"></i>
                                </button>
                                <button onclick="sendMessage()" id="send-button">
                                    <i data-lucide="arrow-up"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="skills-workspace" class="feature-workspace">
                <div class="skills-page">
                    <div class="page-header">
                        <div>
                            <h1>技能管理</h1>
                            <p>查看、搜索、安装、更新和移除当前项目中的技能。</p>
                        </div>
                        <div class="skills-header-actions">
                            <button class="icon-button refresh-button" onclick="toggleSkillSources()" title="查看来源">
                                <i data-lucide="database"></i>
                                <span>来源</span>
                            </button>
                            <button class="icon-button refresh-button" onclick="loadSkills(true)" title="刷新技能列表">
                                <i data-lucide="refresh-cw"></i>
                                <span>刷新</span>
                            </button>
                        </div>
                    </div>

                    <div class="skills-scroll-region">
                        <div class="skills-controls">
                            <div class="skills-search-row">
                                <div class="skill-input-group">
                                    <label for="skill-search-input">搜索技能</label>
                                    <div class="skill-inline-input">
                                        <input id="skill-search-input" type="text" placeholder="关键词，如 ppt、excel、diagram" onkeydown="handleSkillSearchKeydown(event)" />
                                        <button class="icon-button" onclick="searchSkills()" title="搜索技能">
                                            <i data-lucide="search"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="skill-input-group">
                                <label for="skill-install-input">安装技能</label>
                                <div class="skill-inline-input">
                                    <input id="skill-install-input" type="text" placeholder="输入 ClawHub 标识或页面链接" onkeydown="handleSkillInstallKeydown(event)" />
                                    <button class="icon-button" onclick="installSkillFromInput()" title="安装技能">
                                        <i data-lucide="download"></i>
                                    </button>
                                </div>
                                </div>
                            </div>

                            <div id="skill-sources-panel" class="skills-info-panel hidden"></div>
                            <div id="skill-remote-results" class="skills-remote-results hidden"></div>
                        </div>

                        <div id="skills-list" class="skills-page-list"></div>
                    </div>
                </div>
            </section>

            <section id="mcp-workspace" class="feature-workspace">
                <div class="skills-page">
                    <div class="page-header">
                        <div>
                            <h1>MCP 管理</h1>
                        </div>
                        <div class="skills-header-actions">
                            <button class="icon-button refresh-button" onclick="syncEnabledMcpServers()" title="同步启用服务">
                                <i data-lucide="refresh-ccw"></i>
                                <span>同步</span>
                            </button>
                            <button class="icon-button refresh-button" onclick="loadMcpServers(true)" title="刷新 MCP 列表">
                                <i data-lucide="refresh-cw"></i>
                                <span>刷新</span>
                            </button>
                        </div>
                    </div>

                    <div class="skills-scroll-region">
                        <div class="mcp-layout">
                            <div class="mcp-form-card">
                                <div class="mcp-form-header">
                                    <div>
                                        <h3 id="mcp-form-title">新增 MCP 服务</h3>
                                    </div>
                                    <button class="icon-button subtle-action-button" onclick="resetMcpForm()" title="重置表单">
                                        <i data-lucide="rotate-ccw"></i>
                                    </button>
                                </div>

                                <div class="mcp-stack">
                                    <div class="mcp-section-card">
                                        <label for="mcp-name">服务名称</label>
                                        <input id="mcp-name" type="text" placeholder="MCP server name" />
                                    </div>

                                    <div class="mcp-segmented" role="tablist" aria-label="MCP 传输方式">
                                        <button id="mcp-transport-stdio" class="mcp-segment active" type="button" onclick="setMcpTransport('stdio')">STDIO</button>
                                        <button id="mcp-transport-streamable" class="mcp-segment" type="button" onclick="setMcpTransport('streamable_http')">流式 HTTP</button>
                                        <input id="mcp-transport" type="hidden" value="stdio" />
                                    </div>

                                    <div class="mcp-section-card">
                                        <label for="mcp-description">说明</label>
                                        <input id="mcp-description" type="text" placeholder="方便后台识别这个服务的用途" />
                                    </div>

                                    <div id="mcp-command-group" class="mcp-section-card mcp-transport-field" data-transport="stdio">
                                        <label for="mcp-command">命令</label>
                                        <input id="mcp-command" type="text" placeholder="openai-dev-mcp serve-sqlite" />
                                    </div>

                                    <div id="mcp-url-group" class="mcp-section-card mcp-transport-field hidden" data-transport="streamable_http">
                                        <label for="mcp-url">URL</label>
                                        <input id="mcp-url" type="text" placeholder="https://mcp.example.com/mcp" />
                                    </div>

                                    <div id="mcp-bearer-env-group" class="mcp-section-card mcp-transport-field hidden" data-transport="streamable_http">
                                        <label for="mcp-bearer-env">Bearer 令牌环境变量</label>
                                        <input id="mcp-bearer-env" type="text" placeholder="MCP_BEARER_TOKEN" />
                                    </div>

                                    <div id="mcp-args-group" class="mcp-section-card mcp-transport-field" data-transport="stdio">
                                        <label>参数</label>
                                        <div id="mcp-args-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpArgRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加参数</span>
                                        </button>
                                    </div>

                                    <div id="mcp-env-group" class="mcp-section-card mcp-transport-field" data-transport="stdio">
                                        <label>环境变量</label>
                                        <div id="mcp-env-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpEnvRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加环境变量</span>
                                        </button>
                                    </div>

                                    <div id="mcp-env-pass-group" class="mcp-section-card mcp-transport-field" data-transport="stdio">
                                        <label>环境变量传递</label>
                                        <div id="mcp-env-pass-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpEnvPassRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加变量</span>
                                        </button>
                                    </div>

                                    <div id="mcp-cwd-group" class="mcp-section-card mcp-transport-field" data-transport="stdio">
                                        <label for="mcp-cwd">工作目录</label>
                                        <input id="mcp-cwd" type="text" placeholder="~/code" />
                                    </div>

                                    <div id="mcp-headers-group" class="mcp-section-card mcp-transport-field hidden" data-transport="streamable_http">
                                        <label>标头</label>
                                        <div id="mcp-headers-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpHeaderRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加标头</span>
                                        </button>
                                    </div>

                                    <div id="mcp-header-env-group" class="mcp-section-card mcp-transport-field hidden" data-transport="streamable_http">
                                        <label>来自环境变量的标头</label>
                                        <div id="mcp-header-env-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpHeaderEnvRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加变量</span>
                                        </button>
                                    </div>

                                    <div id="mcp-session-kwargs-group" class="mcp-section-card">
                                        <label>会话参数</label>
                                        <div id="mcp-session-kwargs-list" class="mcp-row-list"></div>
                                        <button class="mcp-add-row" type="button" onclick="addMcpSessionKwargRow()">
                                            <i data-lucide="plus"></i>
                                            <span>添加参数</span>
                                        </button>
                                    </div>
                                </div>

                                <div class="mcp-form-actions">
                                    <button class="icon-button refresh-button" type="button" onclick="saveMcpServer()">
                                        <span>保存</span>
                                    </button>
                                    <button class="icon-button refresh-button" type="button" onclick="resetMcpForm()">
                                        <span>清空</span>
                                    </button>
                                </div>
                            </div>

                            <div class="mcp-list-card">
                                <div class="skills-section-header">
                                    <div class="section-heading-group">
                                        <h3>已配置服务</h3>
                                    </div>
                                </div>
                                <div id="mcp-server-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="skill-preview-modal" class="modal-overlay hidden" onclick="closeSkillPreview(event)">
        <div class="modal-panel" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <h2 id="skill-preview-title">技能详情</h2>
                    <p id="skill-preview-meta"></p>
                </div>
                <button class="icon-button modal-close" onclick="closeSkillPreview()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="skill-preview-content" class="modal-content"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/script.js"></script>
</body>

</html>
