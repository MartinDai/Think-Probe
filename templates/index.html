<!DOCTYPE html>
<html lang="zh">

<head>
    <title>Think Probe | Intelligence Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/marked/15.0.7/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area"
                    style="padding: 10px 0 20px 0; color: var(--accent-cyan); display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="brain-circuit" style="width: 24px; height: 24px;"></i>
                    <span style="font-weight: 800; font-size: 18px; letter-spacing: 1px;">THINK PROBE</span>
                </div>
                <button onclick="newConversation()">
                    <i data-lucide="plus"
                        style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px;"></i>
                    新建会话
                </button>
            </div>
            <div id="conversation-list"></div>
        </div>
        <div class="main">
            <div class="chat-header">
                <h1 id="conversation-title" onclick="editConversationTitle()">新会话</h1>
                <span id="conversation-id"></span>
            </div>
            <div id="chat-container" class="new-session">
                <div id="welcome-screen">
                    <i data-lucide="brain-circuit" style="width: 64px; height: 64px;"></i>
                    <h1>今天想研究点什么？</h1>
                </div>
                <div id="messages"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <div id="message-input" contenteditable="true" placeholder="请输入您的问题" onkeydown="handleEnter(event)"></div>
                        <button onclick="stopMessage()" id="stop-button" class="hidden">
                            <i data-lucide="square" style="fill: currentColor;"></i>
                        </button>
                        <button onclick="sendMessage()" id="send-button">
                            <i data-lucide="arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
